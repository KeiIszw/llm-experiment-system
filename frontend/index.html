<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Chat Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bubble { max-width: 80%; border-radius: 15px; padding: 10px 15px; margin: 5px 0; }
        .agent-bubble { background-color: #f1f0f0; align-self: flex-start; }
        .user-bubble { background-color: #0084ff; color: white; align-self: flex-end; }
        .ai-icon { background-color: #4B5563; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white w-full max-w-md h-[600px] shadow-lg rounded-lg flex flex-col border border-gray-200">
        <!-- ヘッダー：普通のチャットツールを装う -->
        <div class="p-4 border-b flex items-center bg-white">
            <div id="agent-icon" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold mr-3 ai-icon">
                AI
            </div>
            <div>
                <div class="font-bold text-gray-800">AI Assistant</div>
                <div class="text-xs text-green-500">オンライン</div>
            </div>
        </div>

        <!-- チャットエリア -->
        <div id="chat-area" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-2 bg-gray-50">
            <!-- 履歴 -->
        </div>

        <!-- 入力エリア（実際には自動操作されるが、見た目として配置） -->
        <div class="p-4 border-t bg-white flex items-center space-x-2">
            <input type="text" id="dummy-input" disabled placeholder="AIが操作しています..." class="flex-1 border rounded-full px-4 py-2 text-sm bg-gray-100 cursor-not-allowed">
            <button id="step-btn" class="bg-blue-500 text-white p-2 rounded-full w-10 h-10 flex items-center justify-center opacity-50 cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                </svg>
            </button>
        </div>
    </div>

    <!-- ステータス表示（デバッグ・自動操作監視用） -->
    <div id="status-display" class="mt-4 p-2 text-xs text-gray-400 font-mono">
        システム待機中...
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const statusDisplay = document.getElementById('status-display');

        async function updateState() {
            const res = await fetch('/state');
            const state = await res.json();
            
            chatArea.innerHTML = '';
            state.history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `chat-bubble ${msg.role === 'assistant' ? 'agent-bubble' : 'user-bubble'}`;
                div.innerText = msg.content;
                chatArea.appendChild(div);
            });
            chatArea.scrollTop = chatArea.scrollHeight;
            statusDisplay.innerText = `Session: ${state.session_id} | Turns: ${state.turn_count} | Complete: ${state.is_completed}`;
        }

        // 定期的に状態をポーリングして更新を表示（Gemini CLIからの操作を反映）
        setInterval(updateState, 1000);
        updateState();
    </script>
</body>
</html>
